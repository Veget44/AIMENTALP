<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental performance app — concept prototype</title>
<meta name="description" content="A clickable concept prototype for a gamified mental performance app, tailored to traditional sport and esports roles.">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
<link rel="icon" type="image/png" sizes="256x256" href="images/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hud-topbar">
    <div class="hud-topbar-label"><span class="live-dot"></span><span data-i18n="meta.top_label"></span><span id="build-number"></span></div>
    <button id="lang-toggle" class="lang-toggle" aria-label="switch language">EN / 한국어</button>
  </div>

  <main class="phone-frame">

    <!-- SCREEN 1: onboarding -->
    <section id="screen-onboarding" class="screen active">
      <img src="images/onboarding-hero.png" alt="" class="hero-image">
      <div class="panel-eyebrow" data-i18n="onboarding.eyebrow"></div>
      <h1 data-i18n="onboarding.title"></h1>
      <p class="subtext" data-i18n="onboarding.subtext"></p>

      <p class="section-label" data-i18n="onboarding.arena_label"></p>
      <div class="option-list">
        <div class="option selected" data-value="sport">
          <i class="ti ti-ball-football"></i>
          <span data-i18n="onboarding.option_sport"></span>
          <i class="ti ti-check check-icon"></i>
        </div>
        <div class="option selected" data-value="esports">
          <i class="ti ti-device-gamepad-2"></i>
          <span data-i18n="onboarding.option_esports"></span>
          <i class="ti ti-check check-icon"></i>
        </div>
        <div class="option" data-value="performing">
          <i class="ti ti-microphone-2"></i>
          <span data-i18n="onboarding.option_performing"></span>
        </div>
        <div class="option" data-value="coaching">
          <i class="ti ti-clipboard-list"></i>
          <span data-i18n="onboarding.option_coaching"></span>
        </div>
        <div class="option" data-value="other">
          <i class="ti ti-dots"></i>
          <span data-i18n="onboarding.option_other"></span>
        </div>
      </div>

      <p class="section-label" data-i18n="onboarding.goal_label"></p>
      <div class="chip-grid">
        <button class="chip-tile selected" data-value="focus">
          <i class="ti ti-target-arrow"></i>
          <span data-i18n="onboarding.goal_focus"></span>
        </button>
        <button class="chip-tile" data-value="confidence">
          <i class="ti ti-mood-smile"></i>
          <span data-i18n="onboarding.goal_confidence"></span>
        </button>
        <button class="chip-tile" data-value="reset">
          <i class="ti ti-refresh"></i>
          <span data-i18n="onboarding.goal_reset"></span>
        </button>
        <button class="chip-tile" data-value="routine">
          <i class="ti ti-repeat"></i>
          <span data-i18n="onboarding.goal_routine"></span>
        </button>
      </div>

      <button class="primary-button" id="btn-to-home" data-i18n="onboarding.continue"></button>
    </section>

    <!-- SCREEN 2: home dashboard (light — one entry point, not a wall of cards) -->
    <section id="screen-home" class="screen">
      <div class="hud-header panel-cut">
        <div class="row-gap">
          <div class="icon-tile"><i class="ti ti-brain"></i></div>
          <div>
            <p class="title-sm" data-i18n="home.header_title"></p>
            <p class="muted-xs" data-i18n="home.header_subtitle"></p>
          </div>
        </div>
        <span class="streak-badge"><i class="ti ti-flame"></i> <span id="streak-text"></span></span>
      </div>

      <div class="card panel-cut accent-mint">
        <div class="row-between">
          <span class="level-label" id="level-text"></span>
          <span class="mono-tag" id="xp-text"></span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="xp-progress-fill" style="width:0%"></div></div>
      </div>

      <button class="primary-button big" id="btn-start-checkin">
        <i class="ti ti-player-play"></i> <span data-i18n="home.start_checkin"></span>
      </button>
      <p class="muted-xs center-text" data-i18n="home.start_checkin_hint"></p>

      <button class="secondary-button full-width" id="btn-to-favorites" style="margin-top:14px;">
        <i class="ti ti-heart"></i> <span data-i18n="home.favorites_button"></span>
      </button>

      <div class="card panel-cut" style="margin-top:22px;">
        <div class="row-between" style="margin-bottom:8px;">
          <span class="section-label" style="margin:0;" data-i18n="home.community_label"></span>
        </div>
        <div class="leaderboard-row">
          <span class="lb-rank">1</span>
          <span class="lb-name" data-i18n="home.community_rows.0.name"></span>
          <span class="mono-tag" data-i18n="home.community_rows.0.streak"></span>
        </div>
        <div class="leaderboard-row">
          <span class="lb-rank">2</span>
          <span class="lb-name" data-i18n="home.community_rows.1.name"></span>
          <span class="mono-tag" data-i18n="home.community_rows.1.streak"></span>
        </div>
        <div class="leaderboard-row">
          <span class="lb-rank">3</span>
          <span class="lb-name" data-i18n="home.community_rows.2.name"></span>
          <span class="mono-tag" data-i18n="home.community_rows.2.streak"></span>
        </div>
        <p class="muted-xs" style="margin:10px 0 0;" data-i18n="home.community_footer"></p>
      </div>

      <button class="reset-link" id="btn-reset-demo" data-i18n="home.reset_demo"></button>
    </section>

    <!-- SCREEN 3: guided check-in flow — one step at a time -->
    <section id="screen-flow" class="screen">
      <div class="flow-header">
        <div class="flow-header-top">
          <div class="flow-dots" id="flow-dots"></div>
          <button class="icon-btn small" id="btn-flow-close" aria-label="close"><i class="ti ti-x"></i></button>
        </div>
        <p class="flow-step-label" id="flow-step-label"></p>
      </div>

      <!-- step: mood -->
      <div class="step-panel" data-step="mood">
        <p class="step-title" data-i18n="flow.mood_question"></p>
        <div class="mood-grid">
          <button class="mood-tile selected" data-mood="calm"><i class="ti ti-mood-smile-beam"></i><span data-i18n="home.moods.calm"></span></button>
          <button class="mood-tile" data-mood="focused"><i class="ti ti-target-arrow"></i><span data-i18n="home.moods.focused"></span></button>
          <button class="mood-tile" data-mood="tense"><i class="ti ti-bolt"></i><span data-i18n="home.moods.tense"></span></button>
          <button class="mood-tile" data-mood="tired"><i class="ti ti-battery-2"></i><span data-i18n="home.moods.tired"></span></button>
          <button class="mood-tile" data-mood="low"><i class="ti ti-cloud-rain"></i><span data-i18n="home.moods.low"></span></button>
          <button class="mood-tile" data-mood="wired"><i class="ti ti-activity"></i><span data-i18n="home.moods.wired"></span></button>
        </div>
      </div>

      <!-- step: game -->
      <div class="step-panel" data-step="game">
        <p class="step-title" data-i18n="flow.game_question"></p>
        <p class="muted-xs" style="margin-bottom:16px;" data-i18n="flow.game_hint"></p>
        <div class="game-list" id="game-list">
          <button class="game-row selected" data-game="lol">
            <img src="images/icon-lol.png" alt="" class="game-icon">
            <span data-i18n="home.games.lol.label"></span>
            <i class="ti ti-check check-icon"></i>
          </button>
          <button class="game-row" data-game="valorant">
            <img src="images/icon-valorant.png" alt="" class="game-icon">
            <span data-i18n="home.games.valorant.label"></span>
            <i class="ti ti-check check-icon"></i>
          </button>
          <button class="game-row" data-game="traditional">
            <img src="images/icon-traditional.png" alt="" class="game-icon">
            <span data-i18n="home.games.traditional.label"></span>
            <i class="ti ti-check check-icon"></i>
          </button>
          <button class="game-row" data-game="other">
            <img src="images/icon-other.png" alt="" class="game-icon">
            <span data-i18n="home.games.other.label"></span>
            <i class="ti ti-check check-icon"></i>
          </button>
        </div>
      </div>

      <!-- step: role + reframe reveal -->
      <div class="step-panel" data-step="role">
        <p class="step-title" data-i18n="flow.role_question"></p>
        <p class="muted-xs" style="margin-bottom:16px;" id="role-question-game"></p>
        <div class="archetype-grid" id="archetype-grid"></div>

        <div id="archetype-result" class="archetype-result hidden">
          <p class="reframe-before" id="archetype-before"></p>
          <div class="reframe-arrow"><i class="ti ti-arrow-down"></i></div>
          <p class="reframe-after" id="archetype-after"></p>
          <button class="favorite-button" id="btn-favorite-role">
            <i class="ti ti-heart"></i>
            <span data-i18n="flow.save_this"></span>
          </button>
          <div class="favorite-note hidden" id="role-note-wrap">
            <input type="text" id="role-note-input" class="note-input" data-i18n-placeholder="flow.note_placeholder">
          </div>
        </div>
        <p class="muted-xs archetype-placeholder" id="archetype-placeholder" data-i18n="flow.role_placeholder"></p>
      </div>

      <!-- step: self-talk -->
      <div class="step-panel" data-step="selftalk">
        <p class="step-title" data-i18n="flow.selftalk_question"></p>
        <div class="phase-tabs" id="phase-tabs">
          <button class="phase-tab selected" data-phase="pre" data-i18n="home.selftalk.tabs.pre"></button>
          <button class="phase-tab" data-phase="mid" data-i18n="home.selftalk.tabs.mid"></button>
          <button class="phase-tab" data-phase="recovery" data-i18n="home.selftalk.tabs.recovery"></button>
        </div>
        <div class="card panel-cut accent-amber">
          <p class="selftalk-line" id="selftalk-line"></p>
          <div class="row-gap">
            <button class="secondary-button" id="btn-try-another" data-i18n="home.try_another"></button>
            <button class="favorite-button" id="btn-favorite-selftalk">
              <i class="ti ti-heart"></i>
              <span data-i18n="flow.save_this"></span>
            </button>
          </div>
          <div class="favorite-note hidden" id="selftalk-note-wrap">
            <input type="text" id="selftalk-note-input" class="note-input" data-i18n-placeholder="flow.note_placeholder">
          </div>
        </div>
      </div>

      <!-- step: checklist -->
      <div class="step-panel" data-step="checklist">
        <p class="step-title" data-i18n="flow.checklist_question"></p>
        <div class="checklist" id="checklist">
          <label class="checklist-item">
            <input type="checkbox" data-index="0" checked>
            <span class="check-box"><i class="ti ti-check"></i></span>
            <span data-i18n="home.checklist_items.0"></span>
          </label>
          <label class="checklist-item">
            <input type="checkbox" data-index="1">
            <span class="check-box"><i class="ti ti-check"></i></span>
            <span data-i18n="home.checklist_items.1"></span>
          </label>
          <label class="checklist-item">
            <input type="checkbox" data-index="2">
            <span class="check-box"><i class="ti ti-check"></i></span>
            <span data-i18n="home.checklist_items.2"></span>
          </label>
        </div>
      </div>

      <div class="flow-nav">
        <button class="secondary-button" id="btn-flow-back" data-i18n="flow.back"></button>
        <button class="primary-button" id="btn-flow-next"></button>
      </div>
    </section>

    <!-- SCREEN: saved lines (favorites) — what the performer AND their coach could review -->
    <section id="screen-favorites" class="screen">
      <div class="hud-header panel-cut">
        <div class="row-gap">
          <button class="icon-btn" id="btn-favorites-back-chevron" aria-label="back"><i class="ti ti-chevron-left"></i></button>
          <div class="icon-tile"><i class="ti ti-heart"></i></div>
          <div>
            <p class="title-sm" data-i18n="favorites.title"></p>
            <p class="muted-xs" data-i18n="favorites.subtitle"></p>
          </div>
        </div>
      </div>

      <p class="section-label" data-i18n="favorites.selftalk_section"></p>
      <div id="favorites-selftalk-list"></div>

      <p class="section-label" data-i18n="favorites.roles_section"></p>
      <div id="favorites-roles-list"></div>

      <p class="section-label" data-i18n="favorites.custom_section"></p>
      <div id="favorites-custom-list"></div>

      <button class="secondary-button full-width" id="btn-add-custom">
        <i class="ti ti-plus"></i> <span data-i18n="favorites.add_custom"></span>
      </button>

      <div class="card panel-cut hidden" id="custom-line-form">
        <p class="mini-label" data-i18n="favorites.custom_phase_label"></p>
        <div class="phase-tabs" id="custom-phase-tabs">
          <button class="phase-tab selected" data-phase="pre" data-i18n="home.selftalk.tabs.pre"></button>
          <button class="phase-tab" data-phase="mid" data-i18n="home.selftalk.tabs.mid"></button>
          <button class="phase-tab" data-phase="recovery" data-i18n="home.selftalk.tabs.recovery"></button>
        </div>
        <textarea id="custom-line-text" class="note-input" rows="2" data-i18n-placeholder="favorites.custom_text_placeholder"></textarea>
        <input type="text" id="custom-line-note" class="note-input" style="margin-top:8px;" data-i18n-placeholder="flow.note_placeholder">
        <button class="primary-button" id="btn-save-custom" style="margin-top:10px;" data-i18n="favorites.save"></button>
      </div>

      <p class="section-label" data-i18n="favorites.wisdom_section"></p>
      <p class="muted-xs" style="margin:-4px 0 12px;" data-i18n="favorites.wisdom_hint"></p>
      <div id="favorites-wisdom-list"></div>

      <div class="card panel-cut coach-note">
        <i class="ti ti-users muted-icon"></i>
        <p class="muted-xs" data-i18n="favorites.coach_note"></p>
      </div>

      <button class="primary-button" id="btn-favorites-back" data-i18n="favorites.back"></button>
    </section>

    <!-- SCREEN: quote card — turn a saved line into a shareable "wise saying" card -->
    <section id="screen-quotecard" class="screen">
      <div class="simple-header">
        <button class="icon-btn" id="btn-quotecard-back-chevron" aria-label="back"><i class="ti ti-chevron-left"></i></button>
        <p class="title-sm" data-i18n="quotecard.header"></p>
      </div>
      <div class="quote-card">
        <i class="ti ti-quote quote-mark"></i>
        <p class="quote-card-text" id="quotecard-text"></p>
        <div class="quote-card-divider"></div>
        <p class="quote-card-tag" id="quotecard-tag"></p>
      </div>
      <button class="secondary-button full-width" id="btn-copy-quote">
        <i class="ti ti-copy"></i> <span id="btn-copy-quote-label" data-i18n="quotecard.copy"></span>
      </button>
      <button class="primary-button" id="btn-quotecard-back" data-i18n="favorites.back"></button>
    </section>

    <!-- SCREEN 4: post-session summary -->
    <section id="screen-summary" class="screen">
      <div class="center-col">
        <img src="images/summary-illustration.png" alt="" class="summary-illustration">
        <p class="title-md" data-i18n="summary.title"></p>
        <p class="muted-xs" data-i18n="summary.subtitle"></p>
      </div>

      <div class="row-gap stretch">
        <div class="card panel-cut center-col flex1">
          <p class="stat-number accent" id="summary-xp-value"></p>
          <p class="muted-xs" data-i18n="summary.xp_label"></p>
        </div>
        <div class="card panel-cut center-col flex1">
          <p class="stat-number" id="summary-streak-value"></p>
          <p class="muted-xs" data-i18n="summary.streak_label"></p>
        </div>
      </div>

      <div class="card panel-cut">
        <p class="section-label" data-i18n="summary.mood_shift_label"></p>
        <div class="row-between" style="align-items:center;">
          <div class="center-col">
            <p class="muted-xs" data-i18n="summary.before_label"></p>
            <p class="bold-sm" data-i18n="summary.before_value"></p>
          </div>
          <i class="ti ti-arrow-right muted-icon"></i>
          <div class="center-col">
            <p class="muted-xs" data-i18n="summary.after_label"></p>
            <p class="bold-sm accent-success" data-i18n="summary.after_value"></p>
          </div>
        </div>
      </div>

      <div class="card panel-cut">
        <p class="section-label" data-i18n="summary.week_label"></p>
        <div class="week-bars">
          <div class="week-bar-col"><div class="week-bar" style="height:30%"></div><span class="week-day" data-i18n="summary.days.0"></span></div>
          <div class="week-bar-col"><div class="week-bar" style="height:55%"></div><span class="week-day" data-i18n="summary.days.1"></span></div>
          <div class="week-bar-col"><div class="week-bar" style="height:40%"></div><span class="week-day" data-i18n="summary.days.2"></span></div>
          <div class="week-bar-col"><div class="week-bar active" style="height:80%"></div><span class="week-day" data-i18n="summary.days.3"></span></div>
          <div class="week-bar-col"><div class="week-bar" style="height:65%"></div><span class="week-day" data-i18n="summary.days.4"></span></div>
          <div class="week-bar-col"><div class="week-bar" style="height:20%"></div><span class="week-day" data-i18n="summary.days.5"></span></div>
          <div class="week-bar-col"><div class="week-bar today" style="height:95%"></div><span class="week-day" data-i18n="summary.days.6"></span></div>
        </div>
      </div>

      <div class="card panel-cut">
        <p class="section-label" data-i18n="summary.badges_label"></p>
        <div class="badge-row">
          <div class="badge-tile unlocked">
            <i class="ti ti-medal"></i>
            <span data-i18n="summary.badges.steady"></span>
          </div>
          <div class="badge-tile">
            <i class="ti ti-lock"></i>
            <span data-i18n="summary.badges.comeback"></span>
          </div>
          <div class="badge-tile">
            <i class="ti ti-lock"></i>
            <span data-i18n="summary.badges.routine"></span>
          </div>
        </div>
        <div class="row-between muted-xs" style="margin:12px 0 6px;">
          <span data-i18n="summary.badge_remaining"></span>
        </div>
        <div class="progress-track segmented"><div class="progress-fill warning" style="width:85%"></div></div>
      </div>

      <button class="primary-button" id="btn-back-home"><i class="ti ti-home"></i> <span data-i18n="summary.back_home"></span></button>
      <button class="secondary-button full-width" id="btn-share" style="margin-top:8px;"><span data-i18n="summary.share_button"></span></button>
    </section>

    <nav class="bottom-tabs" id="bottom-tabs">
      <button class="tab-btn" data-target="screen-home">
        <i class="ti ti-home"></i>
        <span data-i18n="nav.home"></span>
      </button>
      <button class="tab-btn" data-target="screen-favorites">
        <i class="ti ti-heart"></i>
        <span data-i18n="nav.saved"></span>
      </button>
    </nav>

  </main>

  <script src="script.js"></script>
</body>
</html>
